name: mirror-fmcsa-data

on:
  schedule:
    - cron: "15 8 * * *" # daily, ~08:15 UTC — after FMCSA's own nightly refresh
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/mirror.yml"]

permissions:
  contents: write # create/update the `daily` release and its assets

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      # The bulk rows.csv export endpoint silently truncates large pulls and
      # appends a JSON error footer ("}" tail). Page through the SODA resource
      # endpoint instead and verify the final row count against the dataset's
      # own count(*) — a short file must fail the run, never get published.
      - name: Download datasets (paged, verified)
        run: |
          set -euo pipefail
          LIMIT=500000
          fetch () { # $1=name $2=dataset-id $3=required-header
            local name=$1 id=$2 hdr=$3 offset=0 rows
            local expected
            expected=$(curl -fsS "https://data.transportation.gov/resource/$id.json?\$select=count(*)" | grep -oE '[0-9]+')
            rm -f "$name.csv"
            while :; do
              curl -fSL --compressed --retry 3 --retry-delay 20 \
                -A "fmcsa-mirror-data/1.0 (github.com/${{ github.repository }})" \
                "https://data.transportation.gov/resource/$id.csv?\$limit=$LIMIT&\$offset=$offset&\$order=:id" \
                -o page.csv
              case "$(tail -c 2 page.csv)" in *"}"*) echo "json error tail at offset=$offset"; exit 1;; esac
              rows=$(($(wc -l < page.csv) - 1))
              if [ "$offset" = "0" ]; then
                head -1 page.csv | grep -qi "$hdr" || { echo "$name header changed"; exit 1; }
                cp page.csv "$name.csv"
              else
                tail -n +2 page.csv >> "$name.csv"
              fi
              echo "$name offset=$offset rows=$rows"
              [ "$rows" -lt "$LIMIT" ] && break
              offset=$((offset + LIMIT)); sleep 3
            done
            local total=$(($(wc -l < "$name.csv") - 1))
            [ "$total" -ge $((expected - 5000)) ] || { echo "$name SHORT: $total < $expected"; exit 1; }
            echo "$name complete: $total rows (expected $expected)"
          }
          fetch authority 6eyk-hxee docket_number
          fetch census az4n-8mr2 dot_number

      - name: Publish to the `daily` release (overwrite previous assets)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view daily -R "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create daily -R "${{ github.repository }}" \
              --title "Daily FMCSA mirror" \
              --notes "Rolling daily mirror of public-domain FMCSA datasets (L&I authority + company census). Row counts verified against the source before publish."
          gh release upload daily authority.csv census.csv --clobber -R "${{ github.repository }}"
